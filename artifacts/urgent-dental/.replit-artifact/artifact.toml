kind = "web"
previewPath = "/urgent-dental/"
title = "Urgent Dental"
version = "1.0.0"
id = "artifacts/urgent-dental"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/urgent-dental/" ]
localPort = 24296

[services.development]
run = "pnpm --filter @workspace/urgent-dental run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/urgent-dental", "run", "build" ]
publicDir = "artifacts/urgent-dental/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24296"
BASE_PATH = "/urgent-dental/"
