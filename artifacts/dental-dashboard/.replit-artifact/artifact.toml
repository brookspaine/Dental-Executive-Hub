kind = "web"
previewPath = "/"
title = "Dental CEO Dashboard"
version = "1.0.0"
id = "artifacts/dental-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23099

[services.development]
run = "pnpm --filter @workspace/dental-dashboard run dev"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/dental-dashboard", "run", "build"]

[services.production.run]
args = ["node", "artifacts/dental-dashboard/server.mjs"]

[services.production.run.env]
PORT = "23099"
NODE_ENV = "production"

[services.env]
PORT = "23099"
BASE_PATH = "/"
