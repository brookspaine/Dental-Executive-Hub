openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dental CEO Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dailyTop3
    description: Daily Top 3 priorities
  - name: organizations
    description: Organization management
  - name: announcements
    description: Announcements management
  - name: dashboard
    description: Dashboard summary data
  - name: activity
    description: Recent activity feed
  - name: idealWeek
    description: Ideal Week ritual tracking
  - name: wisdomQuotes
    description: Words of Wisdom quote pool
  - name: leaseToolkit
    description: Editable Lease Toolkit document under EDGE Organizations
  - name: me
    description: Authenticated user identity
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /daily-top3:
    get:
      operationId: listDailyTop3
      tags: [dailyTop3]
      summary: List today's top 3 priorities
      responses:
        "200":
          description: List of daily priorities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyTop3Item"
    post:
      operationId: createDailyTop3
      tags: [dailyTop3]
      summary: Create a daily priority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyTop3Body"
      responses:
        "201":
          description: Created priority
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyTop3Item"

  /daily-top3/{id}:
    patch:
      operationId: updateDailyTop3
      tags: [dailyTop3]
      summary: Update a daily priority
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDailyTop3Body"
      responses:
        "200":
          description: Updated priority
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyTop3Item"
    delete:
      operationId: deleteDailyTop3
      tags: [dailyTop3]
      summary: Delete a daily priority
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /future-todos:
    get:
      operationId: listFutureTodos
      tags: [futureTodos]
      summary: List future to-do items
      responses:
        "200":
          description: List of future to-do items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FutureTodo"
    post:
      operationId: createFutureTodo
      tags: [futureTodos]
      summary: Create a future to-do item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFutureTodoBody"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FutureTodo"

  /future-todos/{id}:
    patch:
      operationId: updateFutureTodo
      tags: [futureTodos]
      summary: Update a future to-do item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFutureTodoBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FutureTodo"
    delete:
      operationId: deleteFutureTodo
      tags: [futureTodos]
      summary: Delete a future to-do item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /wisdom-quotes:
    get:
      operationId: listWisdomQuotes
      tags: [wisdomQuotes]
      summary: List all wisdom quotes
      responses:
        "200":
          description: List of wisdom quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WisdomQuote"
    post:
      operationId: createWisdomQuote
      tags: [wisdomQuotes]
      summary: Create a wisdom quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWisdomQuoteBody"
      responses:
        "201":
          description: Created quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WisdomQuote"

  /wisdom-quotes/today:
    get:
      operationId: getTodayWisdomQuotes
      tags: [wisdomQuotes]
      summary: Get today's 3 wisdom quotes (deterministic by date)
      responses:
        "200":
          description: Today's selected wisdom quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WisdomQuote"

  /wisdom-quotes/{id}:
    delete:
      operationId: deleteWisdomQuote
      tags: [wisdomQuotes]
      summary: Delete a wisdom quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List all organizations
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationBody"
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationBody"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    delete:
      operationId: deleteOrganization
      tags: [organizations]
      summary: Delete an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users with a Clerk identity (read-only)
      description: |
        Read-only listing of users that have signed in via Clerk at least
        once. Used to populate the "Linked account" picker on a team
        member, so a free-form name/email can be tied to a real identity.
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List all announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /lease-toolkit:
    get:
      operationId: getLeaseToolkit
      tags: [leaseToolkit]
      summary: Get the editable Lease Toolkit document
      responses:
        "200":
          description: Lease Toolkit document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaseToolkitDoc"
    put:
      operationId: updateLeaseToolkit
      tags: [leaseToolkit]
      summary: Replace the Lease Toolkit document content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeaseToolkitBody"
      responses:
        "200":
          description: Updated Lease Toolkit document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaseToolkitDoc"

  /me:
    get:
      operationId: getCurrentUser
      tags: [me]
      summary: Get the currently signed-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not signed in

  /announcements/{id}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/org-performance:
    get:
      operationId: getOrgPerformance
      tags: [dashboard]
      summary: Get organization performance breakdown
      responses:
        "200":
          description: Performance data by organization
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgPerformance"

  /activity/recent:
    get:
      operationId: getRecentActivity
      tags: [activity]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /ideal-week/schedule-blocks:
    get:
      operationId: listScheduleBlocks
      tags: [idealWeek]
      summary: List all schedule blocks (auto-seeds defaults on first call)
      responses:
        "200":
          description: List of schedule blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleBlock"
    post:
      operationId: createScheduleBlock
      tags: [idealWeek]
      summary: Create a schedule block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleBlockBody"
      responses:
        "201":
          description: Created schedule block
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleBlock"

  /ideal-week/schedule-blocks/{id}:
    patch:
      operationId: updateScheduleBlock
      tags: [idealWeek]
      summary: Update a schedule block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleBlockBody"
      responses:
        "200":
          description: Updated schedule block
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleBlock"
    delete:
      operationId: deleteScheduleBlock
      tags: [idealWeek]
      summary: Delete a schedule block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ideal-week/rituals:
    get:
      operationId: listIdealWeekRituals
      tags: [idealWeek]
      summary: List all ideal week rituals
      responses:
        "200":
          description: List of rituals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdealWeekRitual"

  /ideal-week/rituals/{id}:
    patch:
      operationId: updateIdealWeekRitual
      tags: [idealWeek]
      summary: Update a ritual
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIdealWeekRitualBody"
      responses:
        "200":
          description: Updated ritual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdealWeekRitual"

  /ideal-week/completions:
    get:
      operationId: listIdealWeekCompletions
      tags: [idealWeek]
      summary: List completions for a given date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of completions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdealWeekCompletion"

  /ideal-week/completions/toggle:
    post:
      operationId: toggleIdealWeekCompletion
      tags: [idealWeek]
      summary: Toggle completion status for a ritual on a given date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleIdealWeekCompletionBody"
      responses:
        "200":
          description: Updated completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdealWeekCompletion"

  /lease-records:
    get:
      operationId: listLeaseRecords
      tags: [leaseRecords]
      summary: List lease records (auto-seeds one row per EDGE/UD location)
      responses:
        "200":
          description: List of lease records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaseRecord"

  /lease-records/{id}:
    patch:
      operationId: updateLeaseRecord
      tags: [leaseRecords]
      summary: Partially update a lease record (only sent fields are updated)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeaseRecordBody"
      responses:
        "200":
          description: Updated lease record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaseRecord"
        "404":
          description: Not found

  /lease-records/{id}/documents:
    get:
      operationId: listLeaseDocuments
      tags: [leaseRecords]
      summary: List documents attached to a lease record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of lease documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaseDocument"
    post:
      operationId: createLeaseDocument
      tags: [leaseRecords]
      summary: Attach a document (already uploaded to object storage) to a lease record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaseDocumentBody"
      responses:
        "201":
          description: Created lease document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaseDocument"

  /lease-records/{id}/documents/{docId}:
    delete:
      operationId: deleteLeaseDocument
      tags: [leaseRecords]
      summary: Remove a document attachment from a lease record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: docId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DailyTop3Item:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
        priority:
          type: integer
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - completed
        - priority
        - date
        - createdAt

    CreateDailyTop3Body:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: integer
      required:
        - title
        - priority

    UpdateDailyTop3Body:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
        priority:
          type: integer

    FutureTodo:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        completed:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - completed
        - sortOrder
        - createdAt
        - updatedAt

    CreateFutureTodoBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        sortOrder:
          type: integer
      required:
        - title

    UpdateFutureTodoBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        completed:
          type: boolean
        sortOrder:
          type: integer

    WisdomQuote:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        author:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - text
        - createdAt

    CreateWisdomQuoteBody:
      type: object
      properties:
        text:
          type: string
        author:
          type: string
      required:
        - text

    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        phone:
          type: string
        email:
          type: string
        providerCount:
          type: integer
        patientCount:
          type: integer
        monthlyRevenue:
          type: number
        category:
          type: string
          enum: [edge, edge_dso, urgent_dental]
        status:
          type: string
          enum: [active, inactive]
        beltClassification:
          type: string
          enum: [white, blue, brown, black]
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - address
        - city
        - state
        - status
        - createdAt

    CreateOrganizationBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        phone:
          type: string
        email:
          type: string
        providerCount:
          type: integer
        patientCount:
          type: integer
        monthlyRevenue:
          type: number
        category:
          type: string
          enum: [edge, edge_dso, urgent_dental]
        status:
          type: string
          enum: [active, inactive]
        beltClassification:
          type: string
          enum: [white, blue, brown, black]
          nullable: true
      required:
        - name
        - address
        - city
        - state

    UpdateOrganizationBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        phone:
          type: string
        email:
          type: string
        providerCount:
          type: integer
        patientCount:
          type: integer
        monthlyRevenue:
          type: number
        category:
          type: string
          enum: [edge, edge_dso, urgent_dental]
        status:
          type: string
          enum: [active, inactive]
        beltClassification:
          type: string
          enum: [white, blue, brown, black]
          nullable: true

    User:
      type: object
      description: A Clerk-backed user (one row per authenticated person).
      properties:
        id:
          type: string
          description: Clerk user id (also the primary key).
        email:
          type: string
          nullable: true
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
      required:
        - id
        - name

    Announcement:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [info, warning, success, urgent]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - content
        - type
        - createdAt

    CreateAnnouncementBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
