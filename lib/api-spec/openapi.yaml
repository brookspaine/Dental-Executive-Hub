    post:
      operationId: createDirectReport
      tags: [directReports]
      summary: Create a direct report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectReportBody"
      responses:
        "201":
          description: Created direct report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectReport"

  /direct-reports/{id}:
    get:
      operationId: getDirectReport
      tags: [directReports]
      summary: Get direct report details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Direct report details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectReport"
    patch:
      operationId: updateDirectReport
      tags: [directReports]
      summary: Update a direct report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDirectReportBody"
      responses:
        "200":
          description: Updated direct report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectReport"
    delete:
      operationId: deleteDirectReport
      tags: [directReports]
      summary: Delete a direct report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /direct-reports/{id}/view-as-me-grants:
    get:
      operationId: listViewAsMeGrants
      tags: [directReports]
      summary: List who has "View as Me" access for a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of grantee report IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
    post:
      operationId: createViewAsMeGrant
      tags: [directReports]
      summary: Grant "View as Me" access to a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [granteeReportId]
              properties:
                granteeReportId:
                  type: integer
      responses:
        "201":
          description: Grant created
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /direct-reports/{id}/view-as-me-grants/{granteeReportId}:
    delete:
      operationId: deleteViewAsMeGrant
      tags: [directReports]
      summary: Revoke "View as Me" access for a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: granteeReportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked

  /direct-reports/{id}/additional-viewers:
    get:
      operationId: listAdditionalViewers
      tags: [directReports]
      summary: List who can see a team member's personal Weekly Reports
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of viewer report IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
    post:
      operationId: createAdditionalViewer
      tags: [directReports]
      summary: Add an Additional Viewer for a team member's Weekly Reports
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [viewerReportId]
              properties:
                viewerReportId:
                  type: integer
      responses:
        "201":
          description: Viewer added
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /direct-reports/{id}/additional-viewers/{viewerReportId}:
    delete:
      operationId: deleteAdditionalViewer
      tags: [directReports]
      summary: Remove an Additional Viewer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: viewerReportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /announcements:
    get:
      operationId: listAnnouncements
