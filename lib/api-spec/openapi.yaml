openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dental CEO Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dailyTop3
    description: Daily Top 3 priorities
  - name: organizations
    description: Organization management
  - name: directReports
    description: Direct reports management
  - name: announcements
    description: Announcements management
  - name: dashboard
    description: Dashboard summary data
  - name: activity
    description: Recent activity feed
  - name: idealWeek
    description: Ideal Week ritual tracking
  - name: wisdomQuotes
    description: Words of Wisdom quote pool
  - name: actionItems
    description: Shared action items synchronized across devices and users
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /daily-top3:
    get:
      operationId: listDailyTop3
      tags: [dailyTop3]
      summary: List today's top 3 priorities
      responses:
        "200":
          description: List of daily priorities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyTop3Item"
    post:
      operationId: createDailyTop3
      tags: [dailyTop3]
      summary: Create a daily priority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyTop3Body"
      responses:
        "201":
          description: Created priority
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyTop3Item"

  /daily-top3/{id}:
    patch:
      operationId: updateDailyTop3
      tags: [dailyTop3]
      summary: Update a daily priority
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDailyTop3Body"
      responses:
        "200":
          description: Updated priority
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyTop3Item"
    delete:
      operationId: deleteDailyTop3
      tags: [dailyTop3]
      summary: Delete a daily priority
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /wisdom-quotes:
    get:
      operationId: listWisdomQuotes
      tags: [wisdomQuotes]
      summary: List all wisdom quotes
      responses:
        "200":
          description: List of wisdom quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WisdomQuote"
    post:
      operationId: createWisdomQuote
      tags: [wisdomQuotes]
      summary: Create a wisdom quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWisdomQuoteBody"
      responses:
        "201":
          description: Created quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WisdomQuote"

  /wisdom-quotes/today:
    get:
      operationId: getTodayWisdomQuotes
      tags: [wisdomQuotes]
      summary: Get today's 3 wisdom quotes (deterministic by date)
      responses:
        "200":
          description: Today's selected wisdom quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WisdomQuote"

  /wisdom-quotes/{id}:
    delete:
      operationId: deleteWisdomQuote
      tags: [wisdomQuotes]
      summary: Delete a wisdom quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List all organizations
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationBody"
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationBody"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    delete:
      operationId: deleteOrganization
      tags: [organizations]
      summary: Delete an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /direct-reports:
    get:
      operationId: listDirectReports
      tags: [directReports]
      summary: List all direct reports
      responses:
        "200":
          description: List of direct reports
          content:
            application/json:
              schema:
                type: array
                items:
