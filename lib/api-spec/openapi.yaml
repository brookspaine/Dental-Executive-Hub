              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdealWeekRitual"

  /ideal-week/rituals/{id}:
    patch:
      operationId: updateIdealWeekRitual
      tags: [idealWeek]
      summary: Update a ritual
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIdealWeekRitualBody"
      responses:
        "200":
          description: Updated ritual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdealWeekRitual"

  /ideal-week/completions:
    get:
      operationId: listIdealWeekCompletions
      tags: [idealWeek]
      summary: List completions for a given date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of completions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdealWeekCompletion"

  /ideal-week/completions/toggle:
    post:
      operationId: toggleIdealWeekCompletion
      tags: [idealWeek]
      summary: Toggle completion status for a ritual on a given date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleIdealWeekCompletionBody"
      responses:
        "200":
          description: Updated completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdealWeekCompletion"

  /seats:
    get:
      operationId: listAllSeats
      tags: [orgChart]
      summary: List all org chart seats across all organizations
      responses:
        "200":
          description: All seats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgChartSeat"

  /organizations/{organizationId}/seats:
    get:
      operationId: listOrgChartSeats
      tags: [orgChart]
      summary: List org chart seats for an organization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Seats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgChartSeat"
    post:
      operationId: createOrgChartSeat
      tags: [orgChart]
      summary: Create a seat in an organization's chart
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgChartSeatBody"
      responses:
        "201":
          description: Created seat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgChartSeat"

  /seats/{id}:
    get:
      operationId: getOrgChartSeat
      tags: [orgChart]
      summary: Get a single seat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Seat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgChartSeat"
        "404":
          description: Not found
    patch:
      operationId: updateOrgChartSeat
      tags: [orgChart]
      summary: Update a seat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrgChartSeatBody"
      responses:
        "200":
          description: Updated seat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgChartSeat"
    delete:
      operationId: deleteOrgChartSeat
      tags: [orgChart]
      summary: Delete a seat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /seats/{seatId}/tasks:
    get:
      operationId: listSeatTasks
      tags: [seatTasks]
      summary: List tasks for a seat
      parameters:
        - name: seatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeatTask"
    post:
      operationId: createSeatTask
      tags: [seatTasks]
      summary: Create a task for a seat
      parameters:
        - name: seatId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSeatTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeatTask"

  /seat-tasks/{id}:
    patch:
      operationId: updateSeatTask
      tags: [seatTasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSeatTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeatTask"
    delete:
      operationId: deleteSeatTask
      tags: [seatTasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /seats/{seatId}/key-results:
    get:
      operationId: listSeatKeyResults
      tags: [seatKeyResults]
      summary: List key results for a seat
      parameters:
        - name: seatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Key results
          content:
