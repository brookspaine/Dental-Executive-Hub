      tags: [actionItems]
      summary: List all action items
      responses:
        "200":
          description: List of action items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActionItem"
    post:
      operationId: createActionItem
      tags: [actionItems]
      summary: Create an action item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActionItemBody"
      responses:
        "201":
          description: Created action item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"

  /action-items/import:
    post:
      operationId: importActionItems
      tags: [actionItems]
      summary: Import a batch of action items (used for one-time client migration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportActionItemsBody"
      responses:
        "200":
          description: Updated full list of action items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActionItem"

  /action-items/{id}:
    patch:
      operationId: updateActionItem
      tags: [actionItems]
      summary: Update an action item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActionItemBody"
      responses:
        "200":
          description: Updated action item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"
    delete:
      operationId: deleteActionItem
      tags: [actionItems]
      summary: Delete an action item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /announcements/{id}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/org-performance:
    get:
      operationId: getOrgPerformance
      tags: [dashboard]
      summary: Get organization performance breakdown
      responses:
        "200":
          description: Performance data by organization
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgPerformance"

  /activity/recent:
    get:
      operationId: getRecentActivity
      tags: [activity]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /ideal-week/schedule-blocks:
    get:
      operationId: listScheduleBlocks
      tags: [idealWeek]
      summary: List all schedule blocks (auto-seeds defaults on first call)
      responses:
        "200":
          description: List of schedule blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleBlock"
    post:
      operationId: createScheduleBlock
      tags: [idealWeek]
      summary: Create a schedule block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleBlockBody"
      responses:
        "201":
          description: Created schedule block
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleBlock"

  /ideal-week/schedule-blocks/{id}:
    patch:
      operationId: updateScheduleBlock
      tags: [idealWeek]
      summary: Update a schedule block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleBlockBody"
      responses:
        "200":
          description: Updated schedule block
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleBlock"
    delete:
      operationId: deleteScheduleBlock
      tags: [idealWeek]
      summary: Delete a schedule block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
